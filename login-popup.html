<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login</title>
    <!-- Office JS -->
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
    
    <!-- Google Identity Services (GSI) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithCredential } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // আপনার ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyAkB9KKJNHS_Fnv1QR-NjIBVTp8V5xxSRg",
            authDomain: "bhashamitra-auth.firebaseapp.com",
            projectId: "bhashamitra-auth",
            storageBucket: "bhashamitra-auth.firebasestorage.app",
            messagingSenderId: "638249991236",
            appId: "1:638249991236:web:e8620af758bf9468115011",
            measurementId: "G-X6Y4JEMD6G"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ==========================================
        // ⚠️ আপনার ক্লায়েন্ট আইডি এখানে বসান
        // ==========================================
        const CLIENT_ID = "638249991236-i937ol4m3u0kbn8aqgsjpf47f9oims95.apps.googleusercontent.com"; 

        window.handleGoogleLogin = function(response) {
            const statusText = document.getElementById("status");
            statusText.innerText = "যাচাই করা হচ্ছে...";

            // ১. গুগল থেকে আইডি টোকেন পাওয়া গেছে
            const idToken = response.credential;

            // ২. সেই টোকেন দিয়ে ফায়ারবেসে ক্রেডেনশিয়াল তৈরি
            const credential = GoogleAuthProvider.credential(idToken);

            // ৩. ফায়ারবেসে ম্যানুয়ালি সাইন-ইন (কোনো পপআপ ছাড়াই)
            signInWithCredential(auth, credential)
                .then((result) => {
                    statusText.innerText = "লগইন সফল!";
                    statusText.style.color = "green";
                    // মেইন অ্যাপে তথ্য পাঠানো
                    Office.context.ui.messageParent(JSON.stringify({ status: 'success', email: result.user.email }));
                })
                .catch((error) => {
                    console.error(error);
                    statusText.innerText = "ফায়ারবেস ত্রুটি: " + error.message;
                    statusText.style.color = "red";
                });
        };

        Office.onReady(() => {
            // অফিস রেডি হলে গুগল বাটন ইনিশিয়ালাইজ করুন
            if(window.google) {
                google.accounts.id.initialize({
                    client_id: CLIENT_ID,
                    callback: window.handleGoogleLogin
                });
                
                // গুগল বাটন রেন্ডার করা
                google.accounts.id.renderButton(
                    document.getElementById("googleBtnContainer"),
                    { theme: "outline", size: "large", width: "250" } 
                );
            }
        });
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f3f4f6; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 320px; }
        h2 { margin-top: 0; color: #1f2937; font-size: 18px; margin-bottom: 10px; }
        p { color: #6b7280; font-size: 13px; margin-bottom: 20px; }
        #status { margin-top: 15px; font-size: 12px; font-weight: bold; min-height: 20px; color: #059669; }
        #googleBtnContainer { display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>স্বাগতম</h2>
        <p>Google অ্যাকাউন্টের মাধ্যমে লগইন করুন</p>
        
        <!-- Google বাটন এখানে অটোমেটিক আসবে -->
        <div id="googleBtnContainer"></div>

        <div id="status"></div>
    </div>
</body>
</html>
