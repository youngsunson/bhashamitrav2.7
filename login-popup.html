<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Login</title>
    <!-- অফিস এবং ফায়ারবেস স্ক্রিপ্ট -->
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // আপনার ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyAkB9KKJNHS_Fnv1QR-NjIBVTp8V5xxSRg",
            authDomain: "bhashamitra-auth.firebaseapp.com",
            projectId: "bhashamitra-auth",
            storageBucket: "bhashamitra-auth.firebasestorage.app",
            messagingSenderId: "638249991236",
            appId: "1:638249991236:web:e8620af758bf9468115011",
            measurementId: "G-X6Y4JEMD6G"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        Office.onReady(() => {
            // পেজ লোড হলেই লগইন পপআপ আসবে
            signInWithPopup(auth, provider)
                .then((result) => {
                    // সফল হলে টোকেন নিয়ে প্যারেন্ট উইন্ডোকে মেসেজ পাঠানো হবে
                    const user = result.user;
                    // আমরা সাধারণ টেক্সট মেসেজ পাঠাচ্ছি 'success' হিসেবে
                    // ডেস্কটপ অ্যাপে সেশন শেয়ার নাও হতে পারে, কিন্তু ওয়েবে হবে।
                    // সেরা উপায়ের জন্য আমরা শুধু success জানাবো।
                    Office.context.ui.messageParent(JSON.stringify({ status: 'success' }));
                })
                .catch((error) => {
                    Office.context.ui.messageParent(JSON.stringify({ status: 'error', message: error.message }));
                });
        });
    </script>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; background: #f3f4f6; }
        .loader { border: 4px solid #e5e7eb; border-top: 4px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <p>Google-এ লগইন করা হচ্ছে...</p>
        <p style="font-size: 12px; color: #666;">দয়া করে নতুন উইন্ডোটিতে লগইন করুন।</p>
    </div>
</body>
</html>
