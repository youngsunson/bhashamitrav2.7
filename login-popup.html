<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login</title>
    <!-- Office JS -->
    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
    
    <!-- Firebase SDK via CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // আপনার কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyAkB9KKJNHS_Fnv1QR-NjIBVTp8V5xxSRg",
            authDomain: "bhashamitra-auth.firebaseapp.com",
            projectId: "bhashamitra-auth",
            storageBucket: "bhashamitra-auth.firebasestorage.app",
            messagingSenderId: "638249991236",
            appId: "1:638249991236:web:e8620af758bf9468115011",
            measurementId: "G-X6Y4JEMD6G"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        Office.onReady(() => {
            const loginBtn = document.getElementById("loginBtn");
            const statusText = document.getElementById("status");

            loginBtn.onclick = () => {
                statusText.innerText = "পপআপ খোলা হচ্ছে...";
                
                // বাটনে ক্লিকের মাধ্যমে পপআপ কল করায় 'Missing Initial State' এরর হবে না
                signInWithPopup(auth, provider)
                    .then((result) => {
                        statusText.innerText = "লগইন সফল! উইন্ডো বন্ধ হচ্ছে...";
                        // সফল হলে মেইন অ্যাপকে মেসেজ পাঠানো
                        Office.context.ui.messageParent(JSON.stringify({ status: 'success', email: result.user.email }));
                    })
                    .catch((error) => {
                        console.error(error);
                        statusText.innerText = "ত্রুটি: " + error.message;
                        statusText.style.color = "red";
                    });
            };
        });
    </script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f3f4f6;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 320px;
        }
        h2 { margin-top: 0; color: #1f2937; font-size: 18px; }
        p { color: #6b7280; font-size: 13px; margin-bottom: 20px; }
        
        button {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            transition: all 0.2s;
        }
        button:hover { background: #f9fafb; border-color: #9ca3af; }
        img { width: 18px; height: 18px; }
        #status { margin-top: 15px; font-size: 12px; color: #059669; min-height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>লগইন করুন</h2>
        <p>Google অ্যাকাউন্টের মাধ্যমে লগইন করতে নিচের বাটনে ক্লিক করুন।</p>
        
        <button id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
            Google দিয়ে চালিয়ে যান
        </button>

        <div id="status"></div>
    </div>
</body>
</html>
